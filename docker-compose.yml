services:
  db:
    image: postgres:16-alpine
    container_name: pharmacie-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pharmacie
      POSTGRES_USER: pharmacie
      POSTGRES_PASSWORD: pharmacie
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharmacie -d pharmacie"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: pharmacie-backend
    restart: unless-stopped
    profiles: ["prod"]  # `docker compose up` (no profile) starts only the DB, like before.
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/pharmacie
      DB_USER: pharmacie
      DB_PASSWORD: pharmacie
      # The frontend is same-origin (nginx proxies /api/*), so we only need
      # to allow the public origin if you call the API directly from elsewhere.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    # Not exposed on the host: only the frontend container talks to it.
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
    container_name: pharmacie-frontend
    restart: unless-stopped
    profiles: ["prod"]
    depends_on:
      - backend
    environment:
      # Consumed by the nginx template at container startup.
      BACKEND_URL: http://backend:8080
      PORT: "80"
    ports:
      - "80:80"

volumes:
  pgdata:

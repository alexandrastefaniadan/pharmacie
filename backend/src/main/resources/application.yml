spring:
  application:
    name: pharmacie-backend
  profiles:
    active: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pharmacie}
    username: ${DB_USER:pharmacie}
    password: ${DB_PASSWORD:pharmacie}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate          # NEVER change to update/create — migrations are managed by Flyway
    open-in-view: false           # avoid lazy-loading surprises in controllers
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
    session:
      cookie:
        # SameSite=Lax provides CSRF protection for our cookie-based auth: the
        # browser will only send the session cookie on top-level navigations
        # and same-site requests, blocking cross-site POST/PUT/DELETE attacks.
        # `secure` is auto-enabled on HTTPS (production) and ignored on HTTP (dev).
        same-site: lax
        http-only: true
        secure: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  security:
    # Initial admin credentials. Override with env vars (ADMIN_USERNAME /
    # ADMIN_PASSWORD) in any non-dev environment.
    admin-username: ${ADMIN_USERNAME:admin}
    admin-password: ${ADMIN_PASSWORD:admin}


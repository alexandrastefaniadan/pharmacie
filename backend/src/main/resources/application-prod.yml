# =====================================================================
# Production profile — activated with SPRING_PROFILES_ACTIVE=prod
# =====================================================================
# Reads everything sensitive from environment variables. Designed to run
# behind HTTPS (Render, Nginx, etc.).
# =====================================================================

spring:
  datasource:
    # Either provide the JDBC URL directly via DB_URL (jdbc:postgresql://…),
    # or set DATABASE_URL to the postgres://… style provided by most PaaS
    # platforms (Render, Railway, Heroku) and we convert it at boot.
    url: ${DB_URL:${DATABASE_URL:}}
    username: ${DB_USER:}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true

  servlet:
    session:
      cookie:
        same-site: lax
        http-only: true
        # Production is HTTPS only — the session cookie is rejected over plain
        # HTTP, which is exactly what we want.
        secure: true

server:
  # Trust X-Forwarded-* headers from the reverse proxy (Render, nginx) so the
  # app sees the real client IP and the HTTPS scheme.
  forward-headers-strategy: framework
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

app:
  cors:
    # Comma-separated list of public origins allowed to call the API.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  security:
    admin-username: ${ADMIN_USERNAME:}
    admin-password: ${ADMIN_PASSWORD:}


# =====================================================================
# Production profile — activated with SPRING_PROFILES_ACTIVE=prod
# =====================================================================
# Reads everything sensitive from environment variables. Designed to run
# behind HTTPS (Render, Nginx, etc.).
# =====================================================================

spring:
  datasource:
    # Resolution order:
    #   1. DB_URL              (explicit JDBC URL — used by docker-compose)
    #   2. PGHOST/PGPORT/PGDATABASE  (Railway managed Postgres injects these)
    # On Railway prefer the *private* host to avoid egress; their plugin sets
    # PGHOST to the private hostname automatically when the services share a
    # project.
    url: ${DB_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:pharmacie}}
    username: ${DB_USER:${PGUSER:pharmacie}}
    password: ${DB_PASSWORD:${PGPASSWORD:pharmacie}}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true

  servlet:
    session:
      cookie:
        same-site: lax
        http-only: true
        # Production is HTTPS only — the session cookie is rejected over plain
        # HTTP, which is exactly what we want.
        secure: true

server:
  # Railway sets PORT dynamically; fall back to 8080 for docker-compose.
  port: ${PORT:8080}
  # Trust X-Forwarded-* headers from the reverse proxy (Railway, nginx) so the
  # app sees the real client IP and the HTTPS scheme.
  forward-headers-strategy: framework
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

app:
  cors:
    # Comma-separated list of public origins allowed to call the API.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  security:
    admin-username: ${ADMIN_USERNAME:}
    admin-password: ${ADMIN_PASSWORD:}

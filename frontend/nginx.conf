# Nginx config for the production SPA + API proxy.
#
# - Serves the Angular static bundle from /usr/share/nginx/html.
# - Falls back to /index.html on unknown paths so Angular's client-side
#   router handles deep links (e.g. /categories on first hit).
# - Proxies /api/* to the Spring Boot backend (service name "backend" in
#   docker-compose, configurable through $BACKEND_URL on platforms like
#   Render — change the proxy_pass line then).
# - Adds the basic security headers we want everywhere.

upstream pharmacie_backend {
    # Resolved via Docker's internal DNS to the backend container.
    server backend:8080;
}

server {
    listen       80;
    server_name  _;

    # ---- static SPA ----
    root   /usr/share/nginx/html;
    index  index.html;

    # Long cache for fingerprinted assets, no cache for index.html so
    # users always pick up the latest deploy.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # ---- API proxy ----
    location /api/ {
        proxy_pass         http://pharmacie_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Swagger UI / actuator health — handy when debugging behind nginx.
    location ~ ^/(swagger-ui|v3/api-docs|actuator)/ {
        proxy_pass         http://pharmacie_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- basic hardening headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ---- gzip ----
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 25m;
}


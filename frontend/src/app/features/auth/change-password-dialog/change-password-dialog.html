<p-dialog
  [(visible)]="visibleModel"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '28rem' }"
  header="Changer le mot de passe"
>
  <form [formGroup]="form" class="cp-grid" (ngSubmit)="submit()">
    <label class="field">
      <span>Mot de passe actuel</span>
      <p-password
        formControlName="currentPassword"
        [toggleMask]="true"
        [feedback]="false"
        inputStyleClass="w-full"
        styleClass="w-full"
        autocomplete="current-password"
      />
    </label>

    <label class="field">
      <span>Nouveau mot de passe <small class="text-muted">(10 caractères minimum)</small></span>
      <p-password
        formControlName="newPassword"
        [toggleMask]="true"
        [feedback]="true"
        promptLabel="Choisissez un mot de passe"
        weakLabel="Faible"
        mediumLabel="Moyen"
        strongLabel="Fort"
        inputStyleClass="w-full"
        styleClass="w-full"
        autocomplete="new-password"
      />
    </label>

    <label class="field">
      <span>Confirmer le nouveau mot de passe</span>
      <p-password
        formControlName="confirmPassword"
        [toggleMask]="true"
        [feedback]="false"
        inputStyleClass="w-full"
        styleClass="w-full"
        autocomplete="new-password"
      />
      @if (form.hasError('mismatch') && form.get('confirmPassword')?.touched) {
        <small class="text-danger">Les mots de passe ne correspondent pas.</small>
      }
    </label>

    @if (error()) {
      <p-message severity="error" [text]="error()!" styleClass="w-full" />
    }
  </form>

  <ng-template pTemplate="footer">
    <p-button
      label="Annuler"
      severity="secondary"
      [text]="true"
      (onClick)="visibleModel = false"
    />
    <p-button
      label="Enregistrer"
      icon="pi pi-check"
      [loading]="saving()"
      [disabled]="form.invalid || saving()"
      (onClick)="submit()"
    />
  </ng-template>
</p-dialog>
